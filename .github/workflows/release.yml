name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from plugin.json
        id: version
        uses: notiz-dev/github-action-json-property@release
        with:
          path: "plugin.json"
          prop_path: "Version"

      - name: Display version
        run: echo "Version = ${{ steps.version.outputs.prop }}"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create release archive
        run: |
          zip -r CurseforgeLauncher-${{ steps.version.outputs.prop }}.zip . \
            -x "*.git*" \
            -x ".github/*"

      - name: Create Git tag
        run: |
          git tag v${{ steps.version.outputs.prop }}
          git push origin v${{ steps.version.outputs.prop }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.prop }}
          name: Release v${{ steps.version.outputs.prop }}
          generate_release_notes: true
          files: |
            CurseforgeLauncher-${{ steps.version.outputs.prop }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}